services:
  claude:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-secure:latest
    tty: true
    stdin_open: true
    environment:
      - CLAUDE_CONFIG_DIR=/home/claudeuser/.claude
      - CLAUDE_CODE_SSE_PORT=${CLAUDE_CODE_SSE_PORT}
      - ENABLE_IDE_INTEGRATION=${ENABLE_IDE_INTEGRATION}

    volumes:
      - ${HOME}/.claude:/home/claudeuser/.claude
      - ${HOME}/.claude.json:/home/claudeuser/.claude.json